<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout — illy Caffè National Harbor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="branch.css">
</head>
<body>
<div data-chrome-header></div>

<main class="bx-wrap">
  <nav class="bx-breadcrumb"><a href="../index.html">Home</a> / <a href="cart.html">Cart</a> / <span>Checkout</span></nav>
  <div id="pickup-root"></div>
</main>

<div data-chrome-footer></div>

<script src="../branch-config.js"></script>
<script src="catalog.js"></script>
<script src="branch.js"></script>
<script src="menu.js"></script>
<script src="menu-remote.js"></script>
<script src="menu-cart.js"></script>
<script>
(function () {
  var B = window.ILLY_BRANCH, M = window.ILLY_MENU, store = window.ILLY_BRANCH.store || {};
  B.renderChrome("Coffee");
  var root = document.getElementById("pickup-root");

  var fieldStyle = 'width:100%;padding:11px 12px;border:1px solid #e7ded6;border-radius:8px;font:inherit;margin:0 0 10px;box-sizing:border-box';

  // Load availability + live menu in parallel before rendering. INTERIM: ordering
  // and payment run on the café's Toast page, which enforces its own hours — so
  // we only use /api/availability to show a heads-up banner. If it can't be
  // reached we default to "open" rather than block the handoff.
  Promise.all([
    Promise.resolve(M.ready),
    fetch("/api/availability", { headers: { Accept: "application/json" } })
      .then(function (r) { return r.ok ? r.json() : { open: true, reason: "", source: "unknown" }; })
      .catch(function () { return { open: true, reason: "", source: "unknown" }; })
  ]).then(function (results) {
    start(results[1]);
  });

  function start(avail) {
    var items = B.cart.items();
    if (!items.length) {
      root.innerHTML = '<div class="bx-empty"><p>Your pickup cart is empty.</p><a class="bx-btn" href="menu.html">Start your order</a></div>';
      return;
    }

    var summary = items.map(function (it) {
      return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e7ded6;font-size:14px"><span>' + it.qty + ' × ' + it.product.name.split(" — ")[0] + '</span><strong>' + B.money(it.product.price * it.qty) + '</strong></div>';
    }).join('');

    var open = !!avail.open;
    // Heads-up only — Toast enforces its own ordering hours on its page, so we
    // never block the handoff here; we just let the guest know it may be closed.
    var closedBanner = open ? '' :
      '<div style="background:#fbeae8;border:1px solid #f0c5c0;color:#8a2b22;border-radius:10px;padding:14px 16px;margin:0 0 18px;font-size:14px">⏰ ' +
      (avail.reason || "The café may be closed right now — Toast will show current availability.") + '</div>';

    /* INTERIM checkout: online ordering + payment runs on the café's Toast page.
       Direct order injection (POST /api/order) needs Toast's orders.orders:write,
       which a single location can't get yet — so the primary action sends the
       guest to Toast to finish and pay. (Re-enable the pay-at-café form once
       Zuppler or direct Toast write access is live.) */
    root.innerHTML =
      '<div class="bx-pagehead"><h1>Checkout</h1>' +
      '<p>Complete your order and pay securely on Toast.</p></div>' +
      closedBanner +
      '<div class="bx-pdp" style="align-items:start">' +
        '<div class="bx-store__card">' +
          '<p style="font-size:14px;color:#6a584c;line-height:1.6;margin:0 0 16px">' +
            'Online ordering and payment for ' + (store.name || 'the café') + ' happen on Toast, our ' +
            'point-of-sale. Tap below to choose your items and pay — your order goes straight to the café’s kitchen.' +
          '</p>' +
          '<a class="bx-btn bx-btn--lg bx-btn--full" id="toast-checkout" target="_blank" rel="noopener" href="#">Order &amp; pay on Toast →</a>' +
          '<p style="font-size:12px;color:#b6a99c;margin:10px 0 0;line-height:1.5">Opens Toast’s secure ordering page. Items in your draft below won’t carry over automatically — re-select them on Toast.</p>' +
          '<a class="bx-btn bx-btn--ghost bx-btn--full" style="margin-top:14px" href="menu.html">Keep browsing the menu</a>' +
        '</div>' +
        '<aside class="bx-store__card">' +
          '<h2>Your draft</h2>' + summary +
          '<div style="display:flex;justify-content:space-between;margin-top:14px;font-size:18px"><span style="font-weight:700">Total</span><strong>' + B.money(B.cart.total()) + '</strong></div>' +
          '<div class="bx-pickup" style="margin-top:18px">📍 ' + (store.addressLines || []).join(', ') + '</div>' +
        '</aside>' +
      '</div>';

    document.getElementById("toast-checkout").href = B.toastOrderUrl();
  }
})();
</script>
</body>
</html>
