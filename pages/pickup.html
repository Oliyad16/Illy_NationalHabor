<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Toast Checkout — illy Caffè National Harbor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="branch.css">
</head>
<body>
<div data-chrome-header></div>

<main class="bx-wrap">
  <nav class="bx-breadcrumb"><a href="../index.html">Home</a> / <a href="cart.html">Cart</a> / <span>Pickup</span></nav>
  <div id="pickup-root"></div>
</main>

<div data-chrome-footer></div>

<script src="../branch-config.js"></script>
<script src="catalog.js"></script>
<script src="branch.js"></script>
<script src="menu.js"></script>
<script src="menu-cart.js"></script>
<script>
(function () {
  var B = window.ILLY_BRANCH, store = window.ILLY_BRANCH.store || {};
  B.renderChrome("Coffee");
  var root = document.getElementById("pickup-root");
  var items = B.cart.items();

  if (!items.length) {
    root.innerHTML = '<div class="bx-empty"><p>Your pickup cart is empty.</p><a class="bx-btn" href="menu.html">Start your order</a></div>';
    return;
  }

  var summary = items.map(function (it) {
    return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e7ded6;font-size:14px"><span>' + it.qty + ' × ' + it.product.name.split(" — ")[0] + '</span><strong>' + B.money(it.product.price * it.qty) + '</strong></div>';
  }).join('');

  root.innerHTML =
    '<div class="bx-pagehead"><h1>Complete payment in Toast</h1>' +
    '<p>Your selections are summarized below. Finish checkout through Toast so payment is processed securely and the order is sent to the café POS.</p></div>' +
    '<div class="bx-pdp" style="align-items:start">' +
      '<div class="bx-store__card">' +
        '<h2>Toast checkout</h2>' +
        '<p style="font-size:14px;line-height:1.55;color:#6a584c;margin:0 0 18px">Toast handles online payment, pickup timing, and POS/kitchen submission for this location. Use the secure checkout below to place the live paid order.</p>' +
        '<a class="bx-btn bx-btn--lg bx-btn--full" id="toast-checkout" href="#">Pay online with Toast</a>' +
        '<a class="bx-btn bx-btn--ghost bx-btn--full" style="margin-top:10px" href="menu.html">Keep browsing</a>' +
        '<p style="font-size:13px;color:#8a7a6e;margin:14px 0 0">Current limitation: this static preview cannot push the exact local cart into Toast automatically. Native cart sync requires Toast Orders API access and a backend integration.</p>' +
      '</div>' +
      '<aside class="bx-store__card">' +
        '<h2>Order summary</h2>' + summary +
        '<div style="display:flex;justify-content:space-between;margin-top:14px;font-size:18px"><span style="font-weight:700">Total</span><strong>' + B.money(B.cart.total()) + '</strong></div>' +
        '<div class="bx-pickup" style="margin-top:18px">📍 ' + (store.addressLines || []).join(', ') + '</div>' +
      '</aside>' +
    '</div>';

  document.getElementById("toast-checkout").href = B.toastOrderUrl();
})();
</script>
</body>
</html>
