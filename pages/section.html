<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>illy Caffè National Harbor</title>
<meta name="description" content="Order illy Caffè breakfast, lunch, espresso drinks and sweets for pickup at National Harbor.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="branch.css">
<link rel="stylesheet" href="menu.css">
</head>
<body>
<div data-chrome-header></div>

<main id="section-root"></main>

<div data-chrome-footer></div>

<script src="../branch-config.js"></script>
<script src="catalog.js"></script>
<script src="branch.js"></script>
<script src="menu.js"></script>
<script src="menu-cart.js"></script>
<script src="menu-ui.js"></script>
<script>
(function () {
  var B = window.ILLY_BRANCH, M = window.ILLY_MENU, UI = B.MENU_UI;
  var key = new URLSearchParams(location.search).get("cat") || "menu";

  /* Helper: collect all items across a list of category ids */
  function itemsFromCats(ids) {
    var out = [];
    M.categories.forEach(function (c) {
      if (ids.indexOf(c.id) !== -1) {
        c.items.forEach(function (it) { out.push(it); });
      }
    });
    return out;
  }
  /* Helper: featured items (prefer ones with photos, in-stock) */
  function featured(ids, n) {
    var items = itemsFromCats(ids).filter(function (i) { return !i.outOfStock; });
    var withPhoto = items.filter(function (i) { return M.photoUrl(i); });
    var rest = items.filter(function (i) { return !M.photoUrl(i); });
    return withPhoto.concat(rest).slice(0, n || 6);
  }

  /* DoorDash photo base for hero images */
  var PB = M.photoBase;

  var SECTIONS = {
    menu: {
      active: "Menu",
      title: "The full illy Caffè menu",
      eyebrow: "Order online",
      copy: "Breakfast, lunch, espresso drinks, gelato and sweets — made fresh and ready when you arrive. Browse the full menu and reserve for pickup at our National Harbor café.",
      image: PB + "7d86b7c6-b3f1-46f7-8538-95acf6a17d76-retina-large.jpg",
      cta: ["See full menu", "menu.html"],
      tiles: [
        ["Breakfast & Brunch", "Sandwiches, bagels, toasts and pancakes."],
        ["Lunch", "Salads, focaccia sandwiches and pasta."],
        ["Espresso Bar & Sweets", "illy espresso, gelato and fresh pastries."]
      ],
      gridTitle: "Customer favorites",
      gridItems: function () {
        return featured(["breakfast-sandwiches", "sandwiches-lunch", "avocado-toasts", "pasta-lunch", "sweets", "espresso-bar"], 8);
      }
    },

    drinks: {
      active: "Drinks",
      title: "illy espresso, hot & cold",
      eyebrow: "The Espresso Bar",
      copy: "Authentic illy espresso drinks made to order — lattes, cappuccinos, cold brew, tea lattes, gelato and more. Customize your size, milk and syrups, then pick up in store.",
      image: PB + "20afbf30-27e1-4bc9-ab0c-a7103f166dc1-retina-large.jpg",
      cta: ["Order a drink", "menu.html#cat-espresso-bar"],
      tiles: [
        ["Hot Espresso", "Latte, cappuccino, mocha, cortado and more."],
        ["Cold & Iced", "Cold brew, shakerato, iced lattes."],
        ["Tea & Gelato", "Matcha, chai, and house-made gelato."]
      ],
      gridTitle: "Popular drinks",
      gridItems: function () {
        return itemsFromCats(["espresso-bar", "small-espresso-drinks", "tea-lattes", "gelato", "brewed-coffee", "hot-chocolate"]);
      },
      groupByCategory: ["small-espresso-drinks", "espresso-bar", "tea-lattes", "gelato", "brewed-coffee", "hot-chocolate", "rtd-drinks"]
    },

    food: {
      active: "Food",
      title: "Fresh food, made to order",
      eyebrow: "Breakfast · Lunch · Sweets",
      copy: "From breakfast croissant sandwiches and avocado toast to lunch salads, focaccia sandwiches, pasta and a full bakery case — all prepared fresh at the café.",
      image: PB + "b97ec77a-0889-4852-a4a3-a34e55b6e0cf-retina-large.jpg",
      cta: ["Order food", "menu.html#cat-breakfast-sandwiches"],
      tiles: [
        ["Breakfast & Brunch", "Sandwiches, bagels, toasts, pancakes."],
        ["Lunch", "Salads, sandwiches and pasta."],
        ["Sweets & Bakery", "Pastries, cakes and desserts."]
      ],
      gridTitle: "On the menu",
      gridItems: function () {
        return itemsFromCats(["breakfast-sandwiches", "bagels", "avocado-toasts", "pancakes", "salads-lunch", "sandwiches-lunch", "pasta-lunch", "bakery-pastries", "sweets"]);
      },
      groupByCategory: ["breakfast-sandwiches", "bagels", "avocado-toasts", "pancakes", "salads-lunch", "sandwiches-lunch", "pasta-lunch", "bakery-pastries", "sweets", "a-la-carte"]
    },

    visit: {
      active: "Visit Us",
      title: "Visit illy Caffè National Harbor",
      eyebrow: "Find us",
      copy: "We're on the waterfront at National Harbor. Order ahead for pickup and skip the line, or stop by for espresso, breakfast and lunch. Payment is collected in store.",
      image: PB + "bc04eca2-f0ad-4390-81be-4c01c618920f-retina-large.jpg",
      cta: ["Order for pickup", "menu.html"],
      tiles: [
        ["📍 138 Waterfront Street", "Oxon Hill, MD 20745"],
        ["🕗 Online ordering", "8:00 AM – 6:10 PM daily"],
        ["☎ Contact", "+1 (301) 500-1077"]
      ],
      gridTitle: "Start your order",
      gridItems: function () { return featured(["espresso-bar", "breakfast-sandwiches", "sweets", "sandwiches-lunch"], 8); }
    },

    rewards: {
      active: "Rewards",
      title: "illy Caffè Rewards",
      eyebrow: "Loyalty & perks",
      copy: "Earn on every pickup order and unlock free drinks, birthday treats and members-only perks. Three tiers, no card to carry — just order ahead and the rewards stack up.",
      image: PB + "7d86b7c6-b3f1-46f7-8538-95acf6a17d76-retina-large.jpg",
      cta: ["Start earning — order now", "menu.html"],
      tiles: [
        ["Earn points", "1 point for every $1 spent on pickup orders."],
        ["Redeem", "Free drinks and food as your points grow."],
        ["Member perks", "Birthday treat, early access, member pricing."]
      ],
      content: function () {
        var tiers = [
          { id: "free", name: "Member", badge: "Free", price: "Free to join",
            perks: ["Earn 1 point per $1", "Free birthday drink", "Order-ahead pickup"] },
          { id: "gold", name: "Gold", badge: "100 pts / yr", price: "Reach 100 points",
            perks: ["Everything in Member", "Free drink every 75 points", "Earn 1.25× points", "Skip-the-line pickup"], highlight: true },
          { id: "vip", name: "VIP", badge: "300 pts / yr", price: "Reach 300 points",
            perks: ["Everything in Gold", "Free drink every 50 points", "Earn 1.5× points", "Member pricing on retail beans", "First access to seasonal drinks"] }
        ];
        return '<div class="bx-tiers">' + tiers.map(function (t) {
          return '<article class="bx-tier' + (t.highlight ? ' bx-tier--hl' : '') + '" id="' + t.id + '">' +
            '<div class="bx-tier__badge">' + t.badge + '</div>' +
            '<h3>' + t.name + '</h3>' +
            '<p class="bx-tier__price">' + t.price + '</p>' +
            '<ul>' + t.perks.map(function (p) { return '<li>' + p + '</li>'; }).join('') + '</ul>' +
            '<a class="bx-btn bx-btn--full" href="menu.html">' + (t.highlight ? 'Join &amp; earn' : 'Get started') + '</a>' +
          '</article>';
        }).join('') + '</div>' +
        '<p class="bx-fineprint">Rewards are earned on pickup orders placed through this site. Points and perks are illustrative for this branch preview.</p>';
      }
    },

    giftcards: {
      active: "Gift Cards",
      title: "illy Caffè Gift Cards",
      eyebrow: "The gift of illy",
      copy: "Give a little Italian coffee ritual. illy Caffè gift cards are perfect for the coffee lover in your life — redeemable on espresso, breakfast, lunch and sweets at our National Harbor café.",
      image: PB + "20afbf30-27e1-4bc9-ab0c-a7103f166dc1-retina-large.jpg",
      cta: ["Buy a gift card", "#buy"],
      tiles: [
        ["Any occasion", "Birthdays, thank-yous, or just because."],
        ["Redeem in store", "Use toward any menu item at pickup."],
        ["No expiration", "Spend it whenever the craving hits."]
      ],
      content: function () {
        var amounts = [15, 25, 50, 100];
        return '<div id="buy" class="bx-giftgrid">' + amounts.map(function (a) {
          return '<article class="bx-giftcard">' +
            '<div class="bx-giftcard__face"><span>illy Caffè</span><strong>$' + a + '</strong></div>' +
            '<a class="bx-btn bx-btn--full" href="store.html#contact">Buy $' + a + ' card</a>' +
          '</article>';
        }).join('') + '</div>' +
        '<div id="how" class="bx-howrow">' +
          '<div><h3>1. Choose an amount</h3><p>Pick a value that suits the occasion.</p></div>' +
          '<div><h3>2. We prepare it</h3><p>Pick up a physical card in store, ready to gift.</p></div>' +
          '<div id="balance"><h3>3. Redeem &amp; check balance</h3><p>Use it on any order; ask our team to check the balance anytime.</p></div>' +
        '</div>' +
        '<p class="bx-fineprint">Gift cards are sold and redeemed in store at 138 Waterfront Street. Online purchase is illustrative for this branch preview.</p>';
      }
    },

    story: {
      active: "Visit Us",
      title: "Our Story",
      eyebrow: "illy Caffè National Harbor",
      copy: "A neighborhood café on the National Harbor waterfront, pouring authentic illy espresso alongside fresh breakfast, lunch and house-made sweets. We bring the Italian café ritual to the DMV — one cup at a time.",
      image: PB + "bc04eca2-f0ad-4390-81be-4c01c618920f-retina-large.jpg",
      cta: ["See the menu", "menu.html"],
      tiles: [
        ["Authentic illy", "Proudly serving the illy 100% Arabica blend."],
        ["Made fresh daily", "Breakfast, lunch and pastries prepared in house."],
        ["On the waterfront", "138 Waterfront Street, National Harbor."]
      ],
      content: function () {
        return '<div class="bx-prose">' +
          '<h3>The Italian café ritual, on the Potomac</h3>' +
          '<p>illy Caffè National Harbor was built around a simple idea: a great espresso, made properly, in a space that feels like a little corner of Italy. We pull every shot with the illy blend — a balanced 100% Arabica espresso known the world over for its smooth, aromatic crema.</p>' +
          '<h3>More than coffee</h3>' +
          '<p>Beyond the espresso bar, our kitchen turns out breakfast croissant sandwiches, avocado toast, lunch salads and focaccia sandwiches, fresh pasta, and a bakery case of cakes, eclairs and gelato — all made fresh and ready for pickup or to enjoy by the water.</p>' +
          '<h3>Come say hello</h3>' +
          '<p>Whether it&rsquo;s a morning cappuccino, a working lunch, or an afternoon affogato, you&rsquo;ll find us on the waterfront at National Harbor. Order ahead and skip the line, or stop in and let us pull one for you.</p>' +
        '</div>';
      }
    },

    illyworld: {
      active: "Visit Us",
      title: "Illy World",
      eyebrow: "The world of illy",
      copy: "Behind every cup is a story of quality, craft and culture. Explore what makes illy one of the most recognized names in coffee — the blend, the commitment to sustainability, and the art it inspires.",
      image: PB + "b97ec77a-0889-4852-a4a3-a34e55b6e0cf-retina-large.jpg",
      cta: ["Taste it for yourself", "menu.html"],
      tiles: [
        ["Our Coffee", "A single, unmistakable blend of 9 Arabicas."],
        ["Quality", "Decades of research into the perfect cup."],
        ["Sustainability", "A long-term commitment to growers and the planet."]
      ],
      content: function () {
        return '<div class="bx-prose">' +
          '<h3>One blend, perfected</h3>' +
          '<p>The illy blend brings together nine of the world&rsquo;s finest Arabicas into a single, consistent taste — smooth, full-bodied and aromatic, cup after cup. It&rsquo;s the espresso we&rsquo;re proud to serve at every visit.</p>' +
          '<h3>A commitment to quality</h3>' +
          '<p>illy has spent decades studying coffee — from green bean selection to roasting and extraction — through its own research and the Università del Caffè. That obsession with quality is what you taste in every shot.</p>' +
          '<h3>Sustainability &amp; the art collection</h3>' +
          '<p>illy works directly with growers to improve quality and sustainability, and celebrates coffee culture through the illy Art Collection — cups designed by artists from around the world. It&rsquo;s coffee as craft, and as culture.</p>' +
        '</div>';
      }
    }
  };

  var data = SECTIONS[key] || SECTIONS.menu;
  document.title = data.title + " — illy Caffè National Harbor";
  B.renderChrome(data.active);

  /* Build grid markup — grouped by category when requested, else a flat grid. */
  function gridMarkup() {
    if (data.groupByCategory) {
      return M.categories
        .filter(function (c) { return data.groupByCategory.indexOf(c.id) !== -1; })
        .map(function (c) {
          return '<section class="mn-cat" id="cat-' + c.id + '">' +
            '<h2>' + c.name + '</h2><div class="mn-cat__rule"></div>' +
            UI.itemsGridHTML(c.items) +
          '</section>';
        }).join('');
    }
    return UI.itemsGridHTML(data.gridItems());
  }

  /* Lower block: either a custom content panel (info pages) or the item grid. */
  var lowerBlock = data.content
    ? '<section class="bx-wrap bx-section-content">' + data.content() + '</section>'
    : '<section class="bx-wrap bx-section-products">' +
        '<div class="bx-section-title"><h2>' + data.gridTitle + '</h2><a href="menu.html">View full menu</a></div>' +
        '<div id="section-grid">' + gridMarkup() + '</div>' +
      '</section>';

  document.getElementById("section-root").innerHTML =
    '<section class="bx-section-hero">' +
      '<div class="bx-section-hero__copy">' +
        '<nav class="bx-breadcrumb"><a href="../index.html">Home</a> / <span>' + data.active + '</span></nav>' +
        '<p class="bx-eyebrow">' + data.eyebrow + '</p>' +
        '<h1>' + data.title + '</h1>' +
        '<p>' + data.copy + '</p>' +
        '<a class="bx-btn bx-btn--lg" href="' + data.cta[1] + '">' + data.cta[0] + '</a>' +
      '</div>' +
      '<div class="bx-section-hero__media"><img src="' + data.image + '" alt="' + data.title + '"></div>' +
    '</section>' +
    '<section class="bx-section-band">' +
      '<div class="bx-section-band__inner">' +
        data.tiles.map(function (tile) {
          return '<article class="bx-category-tile"><h2>' + tile[0] + '</h2><p>' + tile[1] + '</p></article>';
        }).join('') +
      '</div>' +
    '</section>' +
    lowerBlock;

  /* Wire ordering (shared modal + click delegation) — only when a grid exists. */
  var grid = document.getElementById("section-grid");
  if (grid) {
    UI.mountModal();
    UI.bindGrid(grid);
  }
})();
</script>
</body>
</html>
